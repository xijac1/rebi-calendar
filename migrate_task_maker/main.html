<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bulk Task Generator - Testing Mode</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 1100px; margin: 40px auto; padding: 20px; }
    h1 { color: #1e3a8a; }
    label { display: block; margin-top: 15px; font-weight: bold; }
    input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    button { padding: 14px 28px; background: #1e40af; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 10px 5px 10px 0; }
    button:hover { background: #1e3a8a; }
    #output { margin-top: 30px; }
    .tasks-container { display: grid; gap: 16px; margin-bottom: 40px; }
    .task-card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 16px;
    }
    .task-header { display: flex; justify-content: space-between; align-items: center; }
    .task-name { font-size: 1.1em; font-weight: bold; color: #1e3a8a; }
    .task-meta { font-size: 0.9em; color: #64748b; }
    .order-badge {
      background: #3b82f6;
      color: white;
      padding: 4px 10px;
      border-radius: 9999px;
      font-size: 0.85em;
      font-weight: bold;
    }
    .json-section {
      margin-top: 30px;
      background: #1f2937;
      color: #e6e6e6;
      padding: 20px;
      border-radius: 8px;
      overflow: auto;
      max-height: 500px;
      white-space: pre-wrap;
      font-family: monospace;
    }
    .copy-btn { padding: 8px 16px; background: #334155; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Bulk Task Generator - Testing Mode</h1>

  <label>Groq API Key (for testing)</label>
  <input type="password" id="groqKey" placeholder="Enter your Groq API key here" value="">

  <label>Model</label>
  <select id="model">
    <option value="llama-3.3-70b-versatile">llama-3.3-70b-versatile (Recommended)</option>
    <option value="qwen/qwen3-32b">qwen/qwen3-32b (Faster)</option>
    <option value="llama-3.1-8b-instant">llama-3.1-8b-instant</option>
  </select>

  <label>Additional Instructions (optional)</label>
  <textarea id="instructions" rows="3" placeholder="E.g.: Order tasks from easiest to hardest, group by phase, etc."></textarea>

  <label>Input Text / Goal</label>
  <textarea id="inputText" rows="12" placeholder="Paste your content, book summary, project description, or goal here..."></textarea>

  <input type="file" id="fileInput" accept=".md,.txt">

  <button onclick="generateTasks()">Generate Tasks</button>

  <div id="output"></div>

  <script>
    async function generateTasks() {
      const apiKey = document.getElementById('groqKey').value.trim();
      if (!apiKey) return alert("Please enter your Groq API key.");

      const text = document.getElementById('inputText').value.trim();
      const file = document.getElementById('fileInput').files[0];
      let content = text;

      if (file) content = await file.text();
      if (!content) return alert("Please provide text or upload a file.");

      const extraInstructions = document.getElementById('instructions').value.trim();
      const model = document.getElementById('model').value;

      document.getElementById('output').innerHTML = '<p><strong>Calling Groq (1 request)... </strong></p>';

      const tasks = await breakdownWithGroq(content, extraInstructions, model, apiKey);

      if (tasks && tasks.length > 0) {
        displayTasks(tasks);
      } else {
        document.getElementById('output').innerHTML += '<p style="color: red;">No tasks returned.</p>';
      }
    }

    async function breakdownWithGroq(content, extraInstructions, model, apiKey) {
      const prompt = `
You are an expert task breakdown assistant.

Content / Goal:
${content.substring(0, 15000)}

${extraInstructions ? `Additional Instructions: ${extraInstructions}` : ''}

Break this into clear actionable tasks.
Assign each task a logical sequential order number starting from 1.

Return ONLY a valid JSON array with this structure:
[
  {
    "order": number,
    "name": "Clean task title without number",
    "type": "Category or type of this task",
    "description": "Short description",
    "estimated_minutes": number
  }
]
`;

      try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: model,
            messages: [{ role: "user", content: prompt }],
            temperature: 0.3,
            max_tokens: 4000,
            response_format: { type: "json_object" }
          })
        });

        if (!res.ok) {
          if (res.status === 429) alert("Rate limit hit. Please wait a moment.");
          else alert("API Error: " + res.status);
          return [];
        }

        const data = await res.json();
        const raw = data.choices[0].message.content;

        const jsonMatch = raw.match(/\[[\s\S]*\]/);
        return jsonMatch ? JSON.parse(jsonMatch[0]) : [];
      } catch (e) {
        console.error(e);
        alert("Request failed: " + e.message);
        return [];
      }
    }

    function displayTasks(tasks) {
      let cardsHTML = `<h2>Generated Tasks (${tasks.length})</h2>`;
      
      tasks.forEach((task) => {
        cardsHTML += `
          <div class="task-card">
            <div class="task-header">
              <div>
                <span class="order-badge">Order ${task.order}</span>
                <span class="task-name">${task.name}</span>
              </div>
              <div class="task-meta">${task.estimated_minutes} min</div>
            </div>
            <p><strong>Type:</strong> ${task.type || 'General'}</p>
            <p><strong>Description:</strong> ${task.description || '-'}</p>
          </div>`;
      });

      const rawJSON = JSON.stringify(tasks, null, 2);

      const fullHTML = `
        ${cardsHTML}
        <h2>Raw JSON Output (for other programs)</h2>
        <button onclick="copyJSON()" class="copy-btn">Copy JSON</button>
        <pre class="json-section">${rawJSON}</pre>
      `;

      document.getElementById('output').innerHTML = fullHTML;
    }

    function copyJSON() {
      const jsonText = document.querySelector('.json-section').textContent;
      navigator.clipboard.writeText(jsonText).then(() => alert('JSON copied to clipboard!'));
    }
  </script>
</body>
</html>
